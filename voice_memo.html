<style>
:root {
  --bg:#f5f5f7;--surface:#fff;--surface2:#f0f0f2;--border:#e0e0e5;
  --accent:#ff3b30;--al:rgba(255,59,48,0.1);
  --t:#1c1c1e;--t2:#6e6e73;--t3:#aeaeb2;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  --tag-h:52px;--nav-h:56px;--ph:72px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(245,245,247,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid var(--border);padding-top:var(--safe-top)}
.nav-inner{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px}
.nav-logo{font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--t);white-space:nowrap}
.nav-logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:3px;flex-shrink:0}
.nav-tab{padding:5px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--t2);transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nav-tab.active{background:var(--surface);color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.nav-tab svg{width:14px;height:14px}
.nav-search-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);flex-shrink:0}
.nav-search-btn svg{width:16px;height:16px}
.search-bar{padding:0 14px 10px;display:none}
.search-bar.open{display:block}
.search-inner{display:flex;align-items:center;gap:6px;background:var(--surface2);border-radius:10px;padding:7px 10px}
.search-inner svg{width:14px;height:14px;color:var(--t3);flex-shrink:0}
.search-inner input{border:none;outline:none;background:transparent;font-family:'Outfit',sans-serif;font-size:14px;color:var(--t);width:100%}
.search-inner input::placeholder{color:var(--t3)}
.tag-bar-wrap{position:fixed;z-index:45;left:0;right:0;top:calc(var(--safe-top) + var(--nav-h));background:rgba(245,245,247,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:.5px solid var(--border)}
.tag-bar{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tag-bar::-webkit-scrollbar{display:none}
.tag-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;color:var(--t2);white-space:nowrap;flex-shrink:0;transition:all .15s}
.tag-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tag-chip .dot{width:7px;height:7px;border-radius:50%}
.content{padding-top:calc(var(--safe-top) + var(--nav-h) + var(--tag-h) + 16px);padding-bottom:calc(var(--ph) + var(--safe-bot) + 90px);min-height:100dvh}
.view{display:none}
.view.active{display:block}
.memo-list{display:flex;flex-direction:column;background:var(--surface);margin:0 14px;border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.empty-state{padding:52px 20px;text-align:center;color:var(--t3);font-size:14px;line-height:1.7}
.empty-state .e-icon{font-size:36px;margin-bottom:12px;opacity:.5}
.memo-item{display:flex;flex-direction:column;padding:16px;border-bottom:.5px solid var(--border);transition:background .12s;position:relative;animation:slideIn .22s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.memo-item:last-child{border-bottom:none}
.memo-item:active{background:var(--surface2)}
.memo-item.is-playing{background:rgba(255,59,48,.04)}
.memo-row1{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.memo-icon{width:36px;height:36px;border-radius:10px;background:var(--al);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.memo-icon svg{width:16px;height:16px;color:var(--accent)}
.memo-item.is-playing .memo-icon{background:var(--accent)}
.memo-item.is-playing .memo-icon svg{color:#fff}
.memo-body{flex:1;overflow:hidden;cursor:pointer}
.memo-name{font-size:14px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.memo-item.is-playing .memo-name{color:var(--accent)}
.memo-meta{font-size:11px;color:var(--t3);margin-top:1px;display:flex;gap:6px}
.memo-meatball{width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);flex-shrink:0;-webkit-appearance:none;transition:background .12s}
.memo-meatball:active{background:var(--surface2)}
.memo-meatball svg{width:18px;height:18px}
.memo-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.mini-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;border:1px solid}
.mini-progress{display:flex;align-items:center;gap:6px}
.mini-track{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.mini-fill{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width .1s linear}
.mini-time{font-size:10px;color:var(--t3);font-variant-numeric:tabular-nums}
.playlist-grid{display:flex;flex-direction:column;gap:10px;padding:0 14px}
.pl-card{background:var(--surface);border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:transform .15s;animation:slideIn .22s ease}
.pl-card:active{transform:scale(.98)}
.pl-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--border)}
.pl-cover{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pl-info{flex:1;overflow:hidden}
.pl-name{font-size:15px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-count{font-size:12px;color:var(--t3);margin-top:1px}
.pl-play-btn{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pl-play-btn svg{width:14px;height:14px;fill:white}
.pl-tracks{display:none}
.pl-card.expanded .pl-tracks{display:block}
.pl-track{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:.5px solid var(--border);font-size:13px;color:var(--t2);cursor:pointer;transition:background .12s}
.pl-track:active{background:var(--surface2)}
.pl-track.is-playing{color:var(--accent);font-weight:600}
.pl-track-num{width:18px;text-align:center;font-size:11px;color:var(--t3)}
.pl-track.is-playing .pl-track-num{color:var(--accent)}
.pl-track-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-track-dur{font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums}
.player{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(245,245,247,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:.5px solid var(--border);padding-bottom:var(--safe-bot);transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.4,.64,1);cursor:pointer}
.player.visible{transform:translateY(0)}
.player-inner{height:var(--ph);display:flex;align-items:center;gap:12px;padding:0 16px}
.player-thumb{width:42px;height:42px;border-radius:10px;background:var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.player-thumb svg{width:20px;height:20px;fill:white}
.player-info{flex:1;overflow:hidden;min-width:0}
.player-name{font-size:14px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-sub{font-size:11px;color:var(--t3);margin-top:1px;font-variant-numeric:tabular-nums}
.player-controls{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ctrl-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t);transition:background .12s;-webkit-appearance:none}
.ctrl-btn:active{background:var(--surface2)}
.ctrl-btn svg{width:18px;height:18px}
.ctrl-btn.main{background:var(--accent);color:white;width:40px;height:40px}
.ctrl-btn.main:active{opacity:.8;background:var(--accent)}
.ctrl-btn.main svg{width:16px;height:16px;fill:white}
.np-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .28s}
.np-overlay.visible{opacity:1;pointer-events:all}
.np-sheet{position:fixed;bottom:0;left:0;right:0;z-index:81;background:var(--surface);border-radius:28px 28px 0 0;padding:0 0 calc(var(--safe-bot) + 24px);transform:translateY(100%);transition:transform .34s cubic-bezier(.34,1.1,.64,1);max-height:92dvh;overflow-y:auto}
.np-overlay.visible .np-sheet{transform:translateY(0)}
.np-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto}
.np-jacket-wrap{padding:8px 32px 24px}
.np-jacket{width:100%;aspect-ratio:1;border-radius:20px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(255,59,48,.3);position:relative;overflow:hidden}
.np-jacket svg{width:36%;height:36%;fill:rgba(255,255,255,.9)}
.np-jacket-rings{position:absolute;inset:0;background:repeating-radial-gradient(circle at 50% 50%,transparent 0,transparent 18%,rgba(255,255,255,.04) 18%,rgba(255,255,255,.04) 20%)}
.np-meta{padding:0 24px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.np-title{font-size:20px;font-weight:700;color:var(--t);letter-spacing:-.3px;flex:1;word-break:break-word}
.np-date{font-size:12px;color:var(--t3);margin-top:4px}
.np-meatball{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t2);-webkit-appearance:none}
.np-meatball svg{width:20px;height:20px}
.np-tags{display:flex;gap:6px;flex-wrap:wrap;padding:0 24px 16px}
.np-tag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px;border:1.5px solid}
.np-seek{padding:0 24px 8px}

.np-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .1s linear;position:relative}

.fab{position:fixed;bottom:calc(var(--ph) + var(--safe-bot) + 16px);right:16px;z-index:55;height:56px;border-radius:28px;padding:0 20px 0 16px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 20px rgba(255,59,48,.4);transition:transform .2s ease,padding .2s,border-radius .2s;-webkit-appearance:none;overflow:hidden}

.fab.open .fab-label{opacity:0;max-width:0}
.fab.open{padding:0 18px;border-radius:50%;width:56px;transform:rotate(45deg)}
.fab:active{transform:scale(.93)}
.sheet-overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-overlay.visible{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:75;background:var(--surface);border-radius:24px 24px 0 0;padding-bottom:calc(var(--safe-bot) + 16px);transform:translateY(100%);transition:transform .32s cubic-bezier(.34,1.15,.64,1)}

<script>

const DB_NAME='memowave_db',DB_VER=2;
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('memos'))d.createObjectStore('memos',{keyPath:'id'});
      if(!d.objectStoreNames.contains('playlists'))d.createObjectStore('playlists',{keyPath:'id'});
      if(!d.objectStoreNames.contains('tags'))d.createObjectStore('tags',{keyPath:'name'});
    };
    req.onsuccess=e=>{db=e.target.result;res();};
    req.onerror=()=>rej(req.error);
  });
}
function dbTx(store,mode,fn){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,mode);
    const s=tx.objectStore(store);
    const req=fn(s);
    if(req){req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);}
    else{tx.oncomplete=res;tx.onerror=()=>rej(tx.error);}
  });
}
const dbGetAll=s=>dbTx(s,'readonly',st=>st.getAll());
const dbPut=(s,o)=>dbTx(s,'readwrite',st=>{st.put(o);});
const dbDel=(s,id)=>dbTx(s,'readwrite',st=>{st.delete(id);});

let memos=[],playlists=[],allTags=[];
let activeTag='all',searchQ='';
let currentAudio=null,currentId=null;
let currentQueue=[],currentQueueIdx=-1;
let tagModalMemoId=null,plPickMemoId=null,meatballMemoId=null;
let selectedEmoji='🎵';
const EMOJIS=['🎵','🎶','📻','🎤','🎙️','🔔','📝','💡','⭐','🔥','💜','🎸'];
const TAG_PALETTE=[
  {color:'#ff3b30',bg:'rgba(255,59,48,0.1)'},
  {color:'#ff9500',bg:'rgba(255,149,0,0.1)'},
  {color:'#34c759',bg:'rgba(52,199,89,0.1)'},
  {color:'#007aff',bg:'rgba(0,122,255,0.1)'},
  {color:'#af52de',bg:'rgba(175,82,222,0.1)'},
  {color:'#5ac8fa',bg:'rgba(90,200,250,0.1)'},
];
function tagStyle(name){const i=allTags.findIndex(t=>t.name===name);return TAG_PALETTE[i%TAG_PALETTE.length]||TAG_PALETTE[0];}
function fmt(s){if(!s||isNaN(s)||!isFinite(s))return '--:--';return Math.floor(s/60)+':'+String(Math.floor(s)%60).padStart(2,'0');}
function fmtSize(b){return b<1048576?(b/1024).toFixed(0)+' KB':(b/1048576).toFixed(1)+' MB';}
function dateStr(ts){return new Date(ts).toLocaleDateString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function blobUrl(memo){if(!memo._url)memo._url=URL.createObjectURL(memo.blob);return memo._url;}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('tab-'+v).classList.add('active');
}
let searchOpen=false;
function toggleSearch(){
  searchOpen=!searchOpen;
  document.getElementById('searchBar').classList.toggle('open',searchOpen);
  if(searchOpen)document.getElementById('searchInput').focus();
  else{document.getElementById('searchInput').value='';searchQ='';renderList();}
}
function onSearch(){searchQ=document.getElementById('searchInput').value.toLowerCase();renderList();}

document.getElementById('fileInput').addEventListener('change',e=>{handleFiles([...e.target.files]);e.target.value='';});
const uz=document.getElementById('uploadZone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag');});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');handleFiles([...e.dataTransfer.files].filter(f=>f.type.startsWith('audio/')));});

async function handleFiles(files){
  const valid=files.filter(f=>f.type.startsWith('audio/')||/\.(m4a|mp3|wav|aac|flac|ogg|caf|aiff|aif)$/i.test(f.name));
  if(!valid.length)return;
  for(const file of valid){
    const memo={id:Date.now()+Math.random(),name:file.name.replace(/\.[^.]+$/,''),date:Date.now(),size:file.size,type:file.type,blob:file,tags:[]};
    await dbPut('memos',memo);
    memos.unshift(memo);
  }
  closeSheet();renderAll();showToast(valid.length+'件を追加しました');
}

function buildQueue(){currentQueue=filteredMemos();}
function playMemo(id,queue){
  if(queue)currentQueue=queue;
  else if(!currentQueue.length||!currentQueue.find(m=>m.id===id))buildQueue();
  currentQueueIdx=currentQueue.findIndex(m=>m.id===id);
  if(currentId===id&&currentAudio){togglePlay();return;}
  stopCurrent();
  const memo=memos.find(m=>m.id===id);
  if(!memo)return;
  currentAudio=new Audio(blobUrl(memo));
  currentId=id;
  currentAudio.ontimeupdate=()=>syncProgress();
  currentAudio.onended=()=>{
    setItemPlaying(id,false);
    setPlayBtnIcon(true);
    document.getElementById('playerSub').textContent='タップして詳細を表示';
  };
  currentAudio.play().catch(()=>{});
  setPlayerUI(memo);
  updateItemUI();
}
function stopCurrent(){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(currentId)setItemPlaying(currentId,false);
  currentId=null;
}
function togglePlay(){
  if(!currentAudio)return;
  if(currentAudio.paused){currentAudio.play();setPlayBtnIcon(false);}
  else{currentAudio.pause();setPlayBtnIcon(true);}
}
function playNext(){
  if(!currentQueue.length)return;
  if(currentQueueIdx>=currentQueue.length-1){
    if(currentAudio){currentAudio.pause();setPlayBtnIcon(true);}
    return;
  }
  currentQueueIdx++;
  playMemo(currentQueue[currentQueueIdx].id);
}
function playPrev(){
  if(currentAudio&&currentAudio.currentTime>3){currentAudio.currentTime=0;return;}
  if(!currentQueue.length)return;
  if(currentQueueIdx<=0){if(currentAudio)currentAudio.currentTime=0;return;}
  currentQueueIdx--;
  playMemo(currentQueue[currentQueueIdx].id);
}
function syncProgress(){
  if(!currentAudio)return;
  const pct=currentAudio.duration?currentAudio.currentTime/currentAudio.duration*100:0;
  const f=document.getElementById('f'+currentId);
  if(f)f.style.width=pct+'%';
  const sub=fmt(currentAudio.currentTime)+' / '+fmt(currentAudio.duration);
  document.getElementById('playerSub').textContent=sub;
  document.getElementById('npFill').style.width=pct+'%';
  document.getElementById('npCurrent').textContent=fmt(currentAudio.currentTime);
  document.getElementById('npDuration').textContent=fmt(currentAudio.duration);
  const tEl=document.getElementById('t'+currentId);
  if(tEl)tEl.textContent=fmt(currentAudio.currentTime)+' / '+fmt(currentAudio.duration);
}
function npSeek(e){
  if(!currentAudio)return;
  const rect=document.getElementById('npTrack').getBoundingClientRect();
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  currentAudio.currentTime=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width))*(currentAudio.duration||0);
}
function setPlayerUI(memo){
  document.getElementById('playerName').textContent=memo.name;
  document.getElementById('playerSub').textContent='タップして詳細を表示';
  document.getElementById('player').classList.add('visible');
  setPlayBtnIcon(false);
  setItemPlaying(memo.id,true);
  updateNowPlaying();
}
function updateNowPlaying(){
  const memo=memos.find(m=>m.id===currentId);
  if(!memo)return;
  document.getElementById('npTitle').textContent=memo.name;
  document.getElementById('npDate').textContent=dateStr(memo.date)+' · '+fmtSize(memo.size);
  const tagsEl=document.getElementById('npTags');
  tagsEl.innerHTML=(memo.tags||[]).map(tn=>{
    const st=tagStyle(tn);
    return '<span class="np-tag" style="color:'+st.color+';background:'+st.bg+';border-color:'+st.color+'">'+esc(tn)+'</span>';
  }).join('');
}
function setPlayBtnIcon(paused){
  const play='<svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
  const pause='<svg viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
  document.getElementById('playerPlayBtn').innerHTML=paused?play:pause;
  document.getElementById('npPlayBtn').innerHTML=paused?play:pause;
}
function setItemPlaying(id,on){
  document.querySelectorAll('.memo-item').forEach(el=>el.classList.remove('is-playing'));
  document.querySelectorAll('.pl-track').forEach(el=>el.classList.remove('is-playing'));
  if(on&&id){
    document.getElementById('item'+id)?.classList.add('is-playing');
    document.querySelectorAll('.pl-track[data-id="'+id+'"]').forEach(el=>el.classList.add('is-playing'));
  }
}
function updateItemUI(){setItemPlaying(currentId,true);}

function openNowPlaying(){
  if(!currentId)return;
  updateNowPlaying();
  document.getElementById('npOverlay').classList.add('visible');
}
function closeNowPlaying(){document.getElementById('npOverlay').classList.remove('visible');}

function closeMeatball(){document.getElementById('meatballOverlay').classList.remove('visible');meatballMemoId=null;}

// Use event delegation for tag chips to avoid quote issues
function filterTag(tag){
  activeTag=tag;
  renderTagBar();
  renderList();
}
function renderTagBar(){
  const bar=document.getElementById('tagBar');
  const chips=[{name:'all',label:'すべて'},...allTags.map(t=>({name:t.name,label:t.name}))];
  bar.innerHTML='';
  chips.forEach(chip=>{
    const div=document.createElement('div');
    div.className='tag-chip'+(activeTag===chip.name?' active':'');
    div.dataset.tag=chip.name;
    if(chip.name!=='all'){
      const st=tagStyle(chip.name);
      const active=activeTag===chip.name;
      if(active){div.style.background=st.color;div.style.borderColor=st.color;div.style.color='#fff';}
      else{div.style.borderColor=st.color;div.style.color=st.color;}
      const dot=document.createElement('span');
      dot.className='dot';dot.style.background=st.color;
      div.appendChild(dot);
    }
    div.appendChild(document.createTextNode(chip.label));
    div.addEventListener('click',()=>filterTag(chip.name));
    bar.appendChild(div);
  });
}
function openTagModal(memoId){
  closeMeatball();
  tagModalMemoId=memoId;
  const memo=memos.find(m=>m.id===memoId);
  document.getElementById('tagModalTitle').textContent=memo?'「'+memo.name+'」のタグ':'タグを編集';
  renderTagSelectGrid(memo?memo.tags:[]);
  document.getElementById('tagModalOverlay').classList.add('visible');
}
function closeTagModal(){
  document.getElementById('tagModalOverlay').classList.remove('visible');
  tagModalMemoId=null;
  renderAll();
}
function renderTagSelectGrid(selected){
  const grid=document.getElementById('tagSelectGrid');
  grid.innerHTML='';
  allTags.forEach(t=>{
    const st=tagStyle(t.name);
    const sel=selected.includes(t.name);
    const div=document.createElement('div');
    div.className='tag-sel-chip'+(sel?' selected':'');
    div.style.color=st.color;
    if(sel){div.style.background=st.bg;div.style.borderColor=st.color;}
    else{div.style.borderColor='var(--border)';}
    const dot=document.createElement('span');dot.className='chip-dot';dot.style.background=st.color;
    div.appendChild(dot);
    div.appendChild(document.createTextNode(t.name));
    div.addEventListener('click',()=>toggleTagOnMemo(t.name));
    grid.appendChild(div);
  });
}
async function toggleTagOnMemo(tagName){
  if(!tagModalMemoId)return;
  const memo=memos.find(m=>m.id===tagModalMemoId);
  if(!memo)return;
  if(memo.tags.includes(tagName))memo.tags=memo.tags.filter(t=>t!==tagName);
  else memo.tags.push(tagName);
  await dbPut('memos',memo);
  renderTagSelectGrid(memo.tags);
  if(currentId===memo.id)updateNowPlaying();
}
async function addNewTag(){
  const inp=document.getElementById('tagNewInput');
  const name=inp.value.trim();
  if(!name||allTags.find(t=>t.name===name)){inp.value='';return;}
  const tag={name};allTags.push(tag);
  await dbPut('tags',tag);
  inp.value='';
  renderTagBar();
  if(tagModalMemoId){const memo=memos.find(m=>m.id===tagModalMemoId);renderTagSelectGrid(memo?memo.tags:[]);}
}

function openPlModal(){
  closePlPick();
  const row=document.getElementById('plEmojiRow');
  row.innerHTML='';
  EMOJIS.forEach(e=>{
    const div=document.createElement('div');
    div.className='pl-emoji-opt'+(e===selectedEmoji?' sel':'');
    div.textContent=e;
    div.addEventListener('click',()=>selectEmoji(e));
    row.appendChild(div);
  });
  document.getElementById('plNameInput').value='';
  document.getElementById('plModalOverlay').classList.add('visible');
}
function closePlModal(){document.getElementById('plModalOverlay').classList.remove('visible');}
function selectEmoji(e){selectedEmoji=e;document.querySelectorAll('.pl-emoji-opt').forEach(el=>el.classList.toggle('sel',el.textContent===e));}
async function createPlaylist(){
  const name=document.getElementById('plNameInput').value.trim()||'新しいリスト';
  const pl={id:Date.now(),name,emoji:selectedEmoji,memoIds:[]};
  playlists.push(pl);
  await dbPut('playlists',pl);
  closePlModal();renderPlaylists();showToast('「'+name+'」を作成しました');
  if(plPickMemoId)openPlPick(plPickMemoId);
}
function openPlPick(memoId){
  closeMeatball();
  plPickMemoId=memoId;
  const list=document.getElementById('plPickList');
  list.innerHTML='';
  if(!playlists.length){
    const d=document.createElement('div');
    d.style.cssText='padding:20px;text-align:center;color:var(--t3);font-size:13px';
    d.textContent='再生リストがありません';
    list.appendChild(d);
  } else {
    playlists.forEach(pl=>{
      const div=document.createElement('div');
      div.className='pl-pick-item';
      div.innerHTML='<div class="pl-pick-icon">'+pl.emoji+'</div><div><div class="pl-pick-name">'+esc(pl.name)+'</div><div class="pl-pick-count">'+pl.memoIds.length+'件</div></div>';
      div.addEventListener('click',()=>addToPlaylist(pl.id));
      list.appendChild(div);
    });
  }
  document.getElementById('plPickOverlay').classList.add('visible');
}
function closePlPick(){document.getElementById('plPickOverlay').classList.remove('visible');}
async function addToPlaylist(plId){
  const pl=playlists.find(p=>p.id===plId);
  if(!pl||!plPickMemoId)return;
  if(!pl.memoIds.includes(plPickMemoId))pl.memoIds.push(plPickMemoId);
  await dbPut('playlists',pl);
  closePlPick();renderPlaylists();
  showToast('「'+pl.name+'」に追加しました');
}

async function deleteMemo(id){
  closeMeatball();closeNowPlaying();
  if(currentId===id){stopCurrent();document.getElementById('player').classList.remove('visible');}
  const memo=memos.find(m=>m.id===id);
  if(memo&&memo._url)URL.revokeObjectURL(memo._url);
  await dbDel('memos',id);
  memos=memos.filter(m=>m.id!==id);
  for(const pl of playlists){
    if(pl.memoIds.includes(id)){pl.memoIds=pl.memoIds.filter(x=>x!==id);await dbPut('playlists',pl);}
  }
  renderAll();showToast('削除しました');
}
function downloadMemo(id){
  closeMeatball();
  const memo=memos.find(m=>m.id===id);
  if(!memo)return;
  const url=blobUrl(memo);
  const ext=(memo.type||'').split('/')[1]||'mp3';
  const a=document.createElement('a');a.href=url;a.download=memo.name+'.'+ext;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function startRename(id){
  closeMeatball();
  const memo=memos.find(m=>m.id===id);if(!memo)return;
  const item=document.getElementById('item'+id);if(!item)return;
  let rw=item.querySelector('.rename-wrap');
  if(!rw){
    rw=document.createElement('div');
    rw.className='rename-wrap visible';
    const inp=document.createElement('input');
    inp.className='rename-input';inp.value=memo.name;inp.maxLength=60;
    const btn=document.createElement('button');
    btn.className='rename-ok';btn.textContent='完了';
    btn.addEventListener('click',()=>doRename(id));
    rw.appendChild(inp);rw.appendChild(btn);
    item.appendChild(rw);
  } else rw.classList.add('visible');
  rw.querySelector('input').focus();
}
async function doRename(id){
  const item=document.getElementById('item'+id);
  const rw=item?item.querySelector('.rename-wrap'):null;
  if(!rw)return;
  const val=rw.querySelector('input').value.trim();
  if(!val)return;
  const memo=memos.find(m=>m.id===id);
  memo.name=val;
  await dbPut('memos',memo);
  rw.classList.remove('visible');
  renderAll();
  if(currentId===id){document.getElementById('playerName').textContent=val;updateNowPlaying();}
}

function filteredMemos(){
  return memos.filter(m=>{
    const tOk=activeTag==='all'||(m.tags||[]).includes(activeTag);
    const qOk=!searchQ||m.name.toLowerCase().includes(searchQ);
    return tOk&&qOk;
  });
}
function renderList(){
  const list=document.getElementById('memoList');
  const label=document.getElementById('listLabel');
  const items=filteredMemos();
  label.style.display=items.length?'block':'none';
  if(!items.length){
    list.innerHTML='<div class="empty-state"><div class="e-icon">🎵</div>'+(memos.length?'フィルター結果なし':'右下の＋ボタンから<br>音声ファイルを追加')+'</div>';
    return;
  }
  list.innerHTML='';
  items.forEach(m=>{
    const div=document.createElement('div');
    div.className='memo-item'+(currentId===m.id?' is-playing':'');
    div.id='item'+m.id;

    // row1
    const row1=document.createElement('div');row1.className='memo-row1';
    const icon=document.createElement('div');icon.className='memo-icon';
    icon.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
    const body=document.createElement('div');body.className='memo-body';
    const nameEl=document.createElement('div');nameEl.className='memo-name';nameEl.textContent=m.name;
    const metaEl=document.createElement('div');metaEl.className='memo-meta';
    metaEl.innerHTML='<span>'+dateStr(m.date)+'</span><span>'+fmtSize(m.size)+'</span>';
    body.appendChild(nameEl);body.appendChild(metaEl);
    body.addEventListener('click',()=>playMemo(m.id));
    const meatball=document.createElement('button');meatball.className='memo-meatball';
    meatball.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>';
    meatball.addEventListener('click',()=>openMeatball(m.id));
    row1.appendChild(icon);row1.appendChild(body);row1.appendChild(meatball);
    div.appendChild(row1);

    // tags
    if(m.tags&&m.tags.length){
      const tagsDiv=document.createElement('div');tagsDiv.className='memo-tags';
      m.tags.forEach(tn=>{
        const st=tagStyle(tn);
        const span=document.createElement('span');span.className='mini-tag';
        span.style.color=st.color;span.style.background=st.bg;span.style.borderColor=st.color;
        span.textContent=tn;tagsDiv.appendChild(span);
      });
      div.appendChild(tagsDiv);
    }

    // progress
    const prog=document.createElement('div');prog.className='mini-progress';
    const track=document.createElement('div');track.className='mini-track';
    const fill=document.createElement('div');fill.className='mini-fill';fill.id='f'+m.id;
    const pct=(currentId===m.id&&currentAudio&&currentAudio.duration)?currentAudio.currentTime/currentAudio.duration*100:0;
    fill.style.width=pct+'%';
    track.appendChild(fill);
    const timeEl=document.createElement('span');timeEl.className='mini-time';timeEl.id='t'+m.id;
    timeEl.textContent=(currentId===m.id&&currentAudio)?fmt(currentAudio.currentTime)+' / '+fmt(currentAudio.duration):'--:--';
    prog.appendChild(track);prog.appendChild(timeEl);
    div.appendChild(prog);

    list.appendChild(div);
  });
}
function renderPlaylists(){
  const grid=document.getElementById('playlistGrid');
  if(!playlists.length){
    grid.innerHTML='<div class="empty-state" style="background:var(--surface);border-radius:16px;"><div class="e-icon">🎵</div>再生リストがありません<br><small style="font-size:11px">メモのメニュー→リストに追加</small></div>';
    return;
  }
  grid.innerHTML='';
  playlists.forEach(pl=>{
    const tracks=pl.memoIds.map(id=>memos.find(m=>m.id===id)).filter(Boolean);
    const card=document.createElement('div');card.className='pl-card';card.id='plcard'+pl.id;

    const header=document.createElement('div');header.className='pl-header';
    header.addEventListener('click',()=>togglePl(pl.id));
    const cover=document.createElement('div');cover.className='pl-cover';cover.textContent=pl.emoji;
    const info=document.createElement('div');info.className='pl-info';
    const pname=document.createElement('div');pname.className='pl-name';pname.textContent=pl.name;
    const pcount=document.createElement('div');pcount.className='pl-count';pcount.textContent=tracks.length+'曲';
    info.appendChild(pname);info.appendChild(pcount);
    const playBtn=document.createElement('button');playBtn.className='pl-play-btn';
    playBtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    playBtn.addEventListener('click',e=>{e.stopPropagation();playPlaylist(pl.id);});
    header.appendChild(cover);header.appendChild(info);header.appendChild(playBtn);

    const trackList=document.createElement('div');trackList.className='pl-tracks';
    tracks.forEach((m,i)=>{
      const tr=document.createElement('div');
      tr.className='pl-track'+(currentId===m.id?' is-playing':'');
      tr.dataset.id=m.id;
      tr.innerHTML='<div class="pl-track-num">'+(i+1)+'</div><div class="pl-track-name">'+esc(m.name)+'</div><div class="pl-track-dur">--:--</div>';
      tr.addEventListener('click',()=>playMemo(m.id));
      trackList.appendChild(tr);
    });

    card.appendChild(header);card.appendChild(trackList);
    grid.appendChild(card);
  });
}
function togglePl(id){document.getElementById('plcard'+id).classList.toggle('expanded');}
function playPlaylist(plId){
  const pl=playlists.find(p=>p.id===plId);
  if(!pl||!pl.memoIds.length)return;
  const queue=pl.memoIds.map(id=>memos.find(m=>m.id===id)).filter(Boolean);
  currentQueue=queue;currentQueueIdx=0;
  playMemo(queue[0].id,queue);
}
function renderAll(){renderList();renderPlaylists();renderTagBar();}

function toggleSheet(){const open=document.getElementById('sheet').classList.contains('visible');open?closeSheet():openSheet();}
function openSheet(){document.getElementById('sheet').classList.add('visible');document.getElementById('sheetOverlay').classList.add('visible');document.getElementById('fab').classList.add('open');}
function closeSheet(){document.getElementById('sheet').classList.remove('visible');document.getElementById('sheetOverlay').classList.remove('visible');document.getElementById('fab').classList.remove('open');}

document.getElementById('tagModalOverlay').addEventListener('click',function(e){if(e.target===this)closeTagModal();});
